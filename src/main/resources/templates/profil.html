<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Netflixo | VIP Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent-color: #E50914;
            --black: #050505;
            --gold: #D4AF37;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100vh;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #1a1a1a 0%, var(--black) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .vip-container {
            background: rgba(18, 18, 18, 0.9);
            backdrop-filter: blur(20px);
            padding: 30px 40px;
            border-radius: 25px;
            width: 420px;
            max-height: 95vh;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            position: relative;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }

        .top-accent {
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: var(--accent-color);
            border-radius: 25px 25px 0 0;
            transition: 0.5s ease;
        }

        h2 {
            text-align: center;
            font-weight: 800;
            letter-spacing: 1px;
            margin: 15px 0 20px 0;
            text-transform: uppercase;
            font-size: 1.4rem;
        }

        h2 span.accent { color: var(--accent-color); transition: 0.5s; }
        h2 span.white { color: #ffffff !important; }

        .color-picker-section {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
        }

        .color-dot {
            width: 26px; height: 26px; border-radius: 50%;
            cursor: pointer; border: 2px solid transparent;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .color-dot:hover { transform: scale(1.2); }
        .color-dot.active { border-color: white; box-shadow: 0 0 10px white; }

        .input-group { margin-bottom: 15px; }
        label {
            display: block; margin-bottom: 6px; font-size: 0.65rem; font-weight: 700;
            color: var(--gold); text-transform: uppercase; letter-spacing: 1px;
        }

        input {
            width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.4);
            border: 1px solid #222; color: white; border-radius: 12px;
            box-sizing: border-box; font-size: 0.9rem; transition: 0.3s;
        }
        input:focus { outline: none; border-color: var(--accent-color); background: #000; }

        .btn-save {
            background: var(--accent-color);
            color: white; border: none; padding: 12px; width: 100%;
            font-weight: 800; border-radius: 12px; cursor: pointer;
            transition: 0.5s; text-transform: uppercase; font-size: 0.85rem;
        }

        .credit-hub {
            margin-top: 25px; padding-top: 20px; border-top: 1px solid #222; text-align: center;
        }

        .kredi-display {
            font-size: 1.6rem; font-weight: 800; color: var(--gold);
            display: block; margin-bottom: 15px;
        }

        .minute-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .box-blue {
            background: rgba(0, 0, 0, 0.5); border: 1px solid #333; color: #fff;
            padding: 10px 5px; border-radius: 10px; cursor: pointer;
            font-size: 0.7rem; font-weight: 700; transition: 0.3s;
        }
        .box-blue:hover { border-color: var(--gold); background: var(--gold); color: #000; }

        .footer-links { text-align: center; margin-top: 20px; }
        .footer-links a { color: #555; text-decoration: none; font-size: 0.75rem; font-weight: 600; }
    </style>
</head>
<body>

<div class="vip-container">
    <div class="top-accent" id="topLine"></div>

    <div style="text-align: center; margin-top: 10px;">
        <img id="avatarPreview" src=""
             style="width: 75px; height: 75px; border-radius: 50%; border: 3px solid var(--accent-color); transition: 0.3s; object-fit: cover;">
        <div style="margin-top: 8px; font-weight: 800; font-size: 0.9rem; color: #fff; text-transform: lowercase;" th:text="${ad}">kemal</div>
    </div>

    <h2><span class="accent">Profil</span> <span class="white">Ayarları</span></h2>

    <div class="color-picker-section">
        <div class="color-dot active" style="background: #E50914;" onclick="changeTheme('#E50914', this)"></div>
        <div class="color-dot" style="background: #007bff;" onclick="changeTheme('#007bff', this)"></div>
        <div class="color-dot" style="background: #2ecc71;" onclick="changeTheme('#2ecc71', this)"></div>
        <div class="color-dot" style="background: #f1c40f;" onclick="changeTheme('#f1c40f', this)"></div>
        <div class="color-dot" style="background: #9b59b6;" onclick="changeTheme('#9b59b6', this)"></div>
        <div class="color-dot" style="background: #e67e22;" onclick="changeTheme('#e67e22', this)"></div>
    </div>

    <form th:action="@{/profil-guncelle}" method="post">
        <div class="input-group">
            <label>Adınız</label>
            <input type="text" name="ad" id="userFirstName" th:value="${ad}" required>
        </div>

        <div class="input-group">
            <label>Soyadınız</label>
            <input type="text" name="soyad" th:value="${soyad}" required>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <button type="submit" class="btn-save">KAYDET</button>
            <a th:href="@{/sifre-sifirlama}" style="text-decoration:none; background:#222; color:#aaa; display:flex; align-items:center; justify-content:center; border-radius:12px; font-weight:600; font-size:0.75rem;">ŞİFRE DEĞİŞTİR</a>
        </div>
    </form>

    <div class="credit-hub">
        <span class="kredi-display" id="dakika-gosterge" th:text="${kredi} + ' DK'">1000 DK</span>
        <div class="minute-grid">
            <div class="box-blue" onclick="ekle(100, false)">+100</div>
            <div class="box-blue" onclick="ekle(500, false)">+500</div>
            <div class="box-blue" onclick="ekle(1200, true)">FIX</div>
        </div>
    </div>

    <div class="footer-links">
        <a th:href="@{/ana-panel}"><i class="fas fa-arrow-left"></i> Vazgeç ve Dön</a>
    </div>
</div>

<script th:inline="javascript">
    const currentName = /*[[${ad}]]*/ 'kemal';
    const initial = currentName ? currentName.charAt(0).toUpperCase() : 'U';

    function changeTheme(color, element) {
        document.documentElement.style.setProperty('--accent-color', color);
        document.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('active'));
        if(element) element.classList.add('active');

        localStorage.setItem('userTheme', color);

        const temizRenk = color.replace('#', '');
        const preview = document.getElementById('avatarPreview');
        if(preview) {
            preview.src = `https://ui-avatars.com/api/?name=${initial}&background=${temizRenk}&color=fff`;
        }
    }

    window.addEventListener('DOMContentLoaded', () => {
        const savedColor = localStorage.getItem('userTheme') || '#E50914';
        document.documentElement.style.setProperty('--accent-color', savedColor);

        const temizRenk = savedColor.replace('#', '');
        const preview = document.getElementById('avatarPreview');
        if(preview) {
            preview.src = `https://ui-avatars.com/api/?name=${initial}&background=${temizRenk}&color=fff`;
        }
    });

    function ekle(miktar, sabit) {
        fetch('/dakika-ekle', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ miktar: miktar, sabit: sabit })
        })
        .then(response => response.text())
        .then(yeniKredi => {
            if(yeniKredi !== "Hata") {
                document.getElementById('dakika-gosterge').innerText = yeniKredi + " DK";
            }
        });
    }
</script>
</body>
</html>
