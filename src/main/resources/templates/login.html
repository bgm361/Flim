<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Netflixo | VIP Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --red: #E50914;
            --black: #050505;
            --gold: #D4AF37;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #1a1a1a 0%, var(--black) 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Arka plan süsü */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--red);
            filter: blur(150px);
            top: -100px;
            right: -100px;
            opacity: 0.2;
        }

        .login-card {
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 20px;
            width: 380px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
        }

        .login-card::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            border-radius: 20px 20px 0 0;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-area h1 {
            color: var(--red);
            font-weight: 800;
            letter-spacing: -2px;
            margin: 0;
            font-size: 2.5rem;
        }

        .logo-area p {
            color: var(--gold);
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 5px;
            opacity: 0.8;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #555;
            transition: 0.3s;
        }

        input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #222;
            color: white;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(0,0,0,0.5);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        input:focus + i {
            color: var(--gold);
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--red);
            color: white;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 12px;
            transition: 0.4s;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(229, 9, 20, 0.3);
        }

        button:hover {
            background: #ff1e2a;
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(229, 9, 20, 0.4);
        }

        .status-msg {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            text-align: center;
        }

        .error-msg { background: rgba(232, 124, 3, 0.1); color: #e87c03; border: 1px solid rgba(232, 124, 3, 0.2); }
        .success-msg { background: rgba(70, 211, 105, 0.1); color: #46d369; border: 1px solid rgba(70, 211, 105, 0.2); }

        .footer-links {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .footer-links a {
            color: #666;
            text-decoration: none;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .footer-links a:hover {
            color: var(--gold);
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-area">
        <h1>NETFLIXO</h1>
        <p>VIP Access Portal</p>
    </div>

    <div th:if="${param.error}" class="status-msg error-msg">
        <i class="fa-solid fa-circle-exclamation"></i> Hatalı e-posta veya şifre!
    </div>

    <div th:if="${param.success}" class="status-msg success-msg">
        <i class="fa-solid fa-circle-check"></i> İşlem başarıyla tamamlandı!
    </div>

    <form th:action="@{/login}" method="post">
        <div class="input-group">
            <input type="email" name="email" placeholder="E-posta Adresi" required>
            <i class="fa-solid fa-envelope"></i>
        </div>

        <div class="input-group">
            <input type="password" name="sifre" placeholder="Şifre" maxlength="10" required>
            <i class="fa-solid fa-lock"></i>
        </div>

        <button type="submit">Sisteme Giriş Yap</button>
    </form>

    <div class="footer-links">
        <a href="/sifresifirlama">Şifremi Unuttum</a>

    </div>
</div>

</body>
</html>
